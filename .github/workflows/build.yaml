name: Test-Build
on:
  push

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
      - uses: depot/setup-action@v1
      - name: Build and Push with Depot
        uses: depot/build-push-action@v1
        with:
          context: .
          secrets: |
            "DEPOT_TOKEN=${{ secrets.DEPOT_TOKEN }}"
          save: true
